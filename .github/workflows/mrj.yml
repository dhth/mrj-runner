name: mrj

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MRJ_VERSION: v0.5.0

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Install mrj
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: dhth/mrj
          tag: ${{ env.MRJ_VERSION }}
      - uses: actions/checkout@v6
      - name: Generate GH token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MRJ_APP_ID }}
          private-key: ${{ secrets.MRJ_APP_PRIVATE_KEY }}
          owner: dhth
      - name: Run mrj
        env:
          MRJ_TOKEN: ${{ steps.generate-token.outputs.token }}
          CLICOLOR_FORCE: 1
          COLORTERM: "truecolor"
        run: |
          mrj run -eos
      - name: Check if results should be published
        id: check-publish
        run: |
          echo "publish=$(./.github/scripts/should-publish-results.sh)" >> "$GITHUB_OUTPUT"
      - name: Generate report
        if: steps.check-publish.outputs.publish == '1'
        run: |
          mrj report generate \
              --title "dependency updates"
      - name: Get run number
        id: run-number
        if: steps.check-publish.outputs.publish == '1'
        run: echo "number=$(cat ./.mrj/last-run.txt)" >> "$GITHUB_OUTPUT"
      - name: Setup Pages
        if: steps.check-publish.outputs.publish == '1'
        uses: actions/configure-pages@v6
      - name: Upload artifact
        if: steps.check-publish.outputs.publish == '1'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "dist"
      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.check-publish.outputs.publish == '1'
        uses: actions/deploy-pages@v5
      - name: Commit and push results
        if: steps.check-publish.outputs.publish == '1'
        run: |
          git config user.name "github-actions[bot]"
          # https://github.com/actions/checkout?tab=readme-ov-file#push-a-commit-using-the-built-in-token
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "add run-${{ steps.run-number.outputs.number }}"
          git push
      - name: Generate summary
        id: get-summary
        if: steps.check-publish.outputs.publish == '1'
        run: |
          echo "summary=$(python -c 'import sys;data = sys.stdin.read().replace("\n", "\\n");print(data)' < summary.txt)" >> "$GITHUB_OUTPUT"
      - name: Send notification
        id: send-notification
        if: steps.check-publish.outputs.publish == '1' && contains(steps.get-summary.outputs.summary, 'SUMMARY')
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": ${{ secrets.SLACK_CHANNEL_ID }},
              "text": "mrj run just concluded",
              "blocks": [
                {
                  "type": "rich_text",
                  "elements": [
                    {
                      "type": "rich_text_preformatted",
                      "elements": [
                        {
                          "type": "text",
                          "text": "mrj run #${{ steps.run-number.outputs.number }} just concluded\n\n${{ steps.get-summary.outputs.summary }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
