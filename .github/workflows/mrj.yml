name: mrj

on:
  schedule:
    # Runs 4 times per day on days 1–5 of every month
    - cron: '0,30 22,23 1-5 * *'
    # Runs 4 times per day on every 5th day of the month (starting from the 10th)
    - cron: '0,30 22,23 10-31/5 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MRJ_VERSION: v0.4.0

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Install mrj
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: dhth/mrj
          tag: ${{ env.MRJ_VERSION }}
      - name: Install tbll
        uses: jaxxstorm/action-install-gh-release@25e24d2d23ae098373794ef1d6faecb48ee52da8 # v3.0.0
        with:
          repo: dhth/tbll
          tag: v1.1.0
      - uses: actions/checkout@v6
      - name: Generate GH token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.MRJ_APP_ID }}
          private-key: ${{ secrets.MRJ_APP_PRIVATE_KEY }}
          owner: dhth
      - name: Run mrj
        env:
          MRJ_TOKEN: ${{ steps.generate-token.outputs.token }}
          CLICOLOR_FORCE: 1
          COLORTERM: "truecolor"
        run: |
          mrj run -eos
      - name: Check if report contains useful info
        id: check-notif
        run: |
          echo "send=$(./.github/scripts/should-send-notif.sh)" >> "$GITHUB_OUTPUT"
      - name: Generate report
        run: |
          mrj report generate \
              --html-template static/template.html \
              --title "dependency updates"
      - name: Get run number
        id: run-number
        run: echo "number=$(cat ./.mrj/last-run.txt)" >> "$GITHUB_OUTPUT"
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Commit and push results
        if: steps.check-notif.outputs.send == '1'
        run: |
          git config user.name "github-actions[bot]"
          # https://github.com/actions/checkout?tab=readme-ov-file#push-a-commit-using-the-built-in-token
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "add run-${{ steps.run-number.outputs.number }}"
          git push
      - name: Generate summary
        id: get-summary
        if: steps.check-notif.outputs.send == '1'
        run: |
          echo "summary=$(python -c 'import sys;data = sys.stdin.read().replace("\n", "\\n");print(data)' < summary.txt)" >> "$GITHUB_OUTPUT"
      - name: Send notification
        id: send-notification
        if: steps.check-notif.outputs.send == '1' && contains(steps.get-summary.outputs.summary, 'SUMMARY')
        uses: slackapi/slack-github-action@v3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": ${{ secrets.SLACK_CHANNEL_ID }},
              "text": "mrj run just concluded",
              "blocks": [
                {
                  "type": "rich_text",
                  "elements": [
                    {
                      "type": "rich_text_preformatted",
                      "elements": [
                        {
                          "type": "text",
                          "text": "mrj run #${{ steps.run-number.outputs.number }} just concluded\n\n${{ steps.get-summary.outputs.summary }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
